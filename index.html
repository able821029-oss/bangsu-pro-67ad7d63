    <!-- ──────────────── GA4 ──────────────── -->
    <!-- VITE_GA_ID를 .env에 설정한 뒤 아래 스크립트가 자동으로 동작.
         실제 ID 주입은 빌드 시 Vite가 import.meta.env로 처리하므로,
         여기서는 data-속성을 통해 런타임 부트스트랩을 한다. -->
    <script>
      (function () {
        var GA_ID = "%VITE_GA_ID%";
        if (!GA_ID || GA_ID.indexOf("%VITE_") === 0) return;
        var host = window.location.hostname;
        if (host === "localhost" || host === "127.0.0.1") return;
        var s = document.createElement("script");
        s.async = true;
        s.src = "https://www.googletagmanager.com/gtag/js?id=" + GA_ID;
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        window.gtag = function () { window.dataLayer.push(arguments); };
        window.gtag("js", new Date());
        window.gtag("config", GA_ID, { send_page_view: true });
      })();
    </script>

    <!-- ──────────── Microsoft Clarity ──────────── -->
    <script>
      (function () {
        var CLARITY_ID = "%VITE_CLARITY_ID%";
        if (!CLARITY_ID || CLARITY_ID.indexOf("%VITE_") === 0) return;
        var host = window.location.hostname;
        if (host === "localhost" || host === "127.0.0.1") return;
        (function (c, l, a, r, i, t, y) {
          c[a] = c[a] || function () { (c[a].q = c[a].q || []).push(arguments); };
          t = l.createElement(r); t.async = 1;
          t.src = "https://www.clarity.ms/tag/" + i;
          y = l.getElementsByTagName(r)[0]; y.parentNode.insertBefore(t, y);
        })(window, document, "clarity", "script", CLARITY_ID);
      })();
    </script>

    <!-- ──────────── Kakao JavaScript SDK ──────────── -->
