name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and deploy to Cloudflare Pages
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build
        env:
          VITE_SUPABASE_URL: https://stnpepxiysfoblfeqvpu.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN0bnBlcHhpeXNmb2JsZmVxdnB1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTQwMTAsImV4cCI6MjA5MTIzMDAxMH0.ipYiFOAbS1XQ1hpTa_kghsdUFDWv8P-OhzIPtSQW1qA
          VITE_SUPABASE_PROJECT_ID: stnpepxiysfoblfeqvpu
          VITE_VIDEO_SERVER_URL: https://bangsu-pro-67ad7d63-production-6e2e.up.railway.app
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=sms-app --branch=main --commit-dirty=true
